<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 张津华个人学术主页</title>
  <style>
    body { margin: 0; }
    /* 登录页面居中 */
    .login-message {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: "Noto Sans SC", sans-serif;
      color: #6b6b6b; font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div id="status" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-size:1rem;color:#333;">
    管理后台加载中...
  </div>
  <script>
    window.CMS_MANUAL_INIT = true;
    document.getElementById('status').textContent = 'Decap CMS JS 加载中...';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.12.0/dist/decap-cms.js" onerror="document.getElementById('status').textContent='❌ CDN 加载失败'"></script>
  <script>
    // 自定义中文翻译（覆盖默认英文）
    CMS.registerLocale('zh-cn', {
      auth: {
        login: '使用 GitHub 登录',
        loggingIn: '正在登录…',
        loginWith: '使用 GitHub 登录',
      },
      app: {
        header: {
          content: '内容',
          media: '媒体库',
          workflow: '工作流',
        },
      },
      collection: {
        sidebar: {
          collections: '集合',
          searchAll: '搜索全部',
        },
      },
      editor: {
        editorControlPane: {
          publish: '发布',
          published: '已发布',
        },
        editor: {
          preview: '预览',
        },
      },
    });

    // 用 Proxy 全面代理 window.open 返回值，拦截 location/href
    var openViaLink = function(targetUrl) {
      if (!targetUrl || targetUrl.indexOf('github.com/login/oauth') === -1) return;
      var a = document.createElement('a');
      a.href = targetUrl;
      a.target = '_blank';
      a.rel = 'opener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };

    window.open = function(url, name, features) {
      return new Proxy({ closed: false }, {
        set: function(target, prop, value) {
          if (prop === 'location') {
            openViaLink(typeof value === 'string' ? value : value && value.href);
            return true;
          }
          target[prop] = value;
          return true;
        },
        get: function(target, prop) {
          if (prop === 'location') {
            return new Proxy({ href: '' }, {
              set: function(t, p, v) {
                if (p === 'href') openViaLink(v);
                return true;
              }
            });
          }
          if (prop in target) return target[prop];
          return function() {};
        }
      });
    };

    CMS.init();
    document.getElementById('status').style.display = 'none';
  </script>
</body>
</html>
