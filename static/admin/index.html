<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 张津华个人学术主页</title>
  <style>
    body { margin: 0; }
    /* 登录页面居中 */
    .login-message {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: "Noto Sans SC", sans-serif;
      color: #6b6b6b; font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div id="status" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-size:1rem;color:#333;">
    管理后台加载中...
  </div>
  <script>
    window.CMS_MANUAL_INIT = true;
    document.getElementById('status').textContent = 'Decap CMS JS 加载中...';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.12.0/dist/decap-cms.js" onerror="document.getElementById('status').textContent='❌ CDN 加载失败'"></script>
  <script>
    // 自定义中文翻译（覆盖默认英文）
    CMS.registerLocale('zh-cn', {
      auth: {
        login: '使用 GitHub 登录',
        loggingIn: '正在登录…',
        loginWith: '使用 GitHub 登录',
      },
      app: {
        header: {
          content: '内容',
          media: '媒体库',
          workflow: '工作流',
        },
      },
      collection: {
        sidebar: {
          collections: '集合',
          searchAll: '搜索全部',
        },
      },
      editor: {
        editorControlPane: {
          publish: '发布',
          published: '已发布',
        },
        editor: {
          preview: '预览',
        },
      },
    });

    CMS.init();
    document.getElementById('status').style.display = 'none';

    // localStorage 兜底认证
    (function autoAuth() {
      var token = localStorage.getItem('gh_token');
      if (!token) { setTimeout(autoAuth, 500); return; }
      localStorage.removeItem('gh_token');

      // 点击登录按钮触发 Decap CMS 建立消息监听器
      var btn = document.querySelector('button');
      if (!btn) { setTimeout(autoAuth, 500); return; }

      // 拦截 window.open，返回静默 dummy
      var _open = window.open;
      window.open = function() {
        window.open = _open;
        var d = { closed: false, close: function(){} };
        Object.defineProperty(d, 'location', {
          set: function(){}, get: function(){ return { href: '' }; }, configurable: true
        });
        return d;
      };
      btn.click();

      // 等监听器建立后发送 token
      setTimeout(function() {
        window.postMessage({ token: token, provider: 'github' }, window.location.origin);
      }, 1500);
    })();

    // storage 事件：跨标签页实时接收
    window.addEventListener('storage', function(e) {
      if (e.key !== 'gh_token' || !e.newValue) return;
      localStorage.removeItem('gh_token');
      setTimeout(function() {
        window.postMessage({ token: e.newValue, provider: 'github' }, window.location.origin);
      }, 200);
    });
  </script>
</body>
</html>
