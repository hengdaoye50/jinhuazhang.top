<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 张津华个人学术主页</title>
  <style>
    body { margin: 0; }
    #nc-root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="status" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#333;">
    管理后台加载中...
  </div>
  <script>
    window.CMS_MANUAL_INIT = true;
    document.getElementById('status').textContent = 'Decap CMS JS 加载中...';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.12.0/dist/decap-cms.js" onerror="document.getElementById('status').textContent='CDN 加载失败'"></script>
  <script>
    CMS.registerLocale('zh-cn', {
      auth: {
        login: '使用 GitHub 登录',
        loggingIn: '正在登录…',
        loginWith: '使用 GitHub 登录',
      },
      app: {
        header: { content: '内容', media: '媒体库', workflow: '工作流' },
      },
      collection: {
        sidebar: { collections: '集合', searchAll: '搜索全部' },
      },
      editor: {
        editorControlPane: { publish: '发布', published: '已发布' },
        editor: { preview: '预览' },
      },
    });

    CMS.init();
    document.getElementById('status').style.display = 'none';

    // 页面重载后 localsStorage 有 token → 自动完成认证
    (function() {
      var token = localStorage.getItem('gh_token');
      if (!token) return;
      // 等 CMS.init 完成后再触发
      setTimeout(function() {
        var btn = document.querySelector('button');
        if (!btn) return;
        localStorage.removeItem('gh_token');
        // 点击登录按钮 → Decap CMS 建立监听器
        btn.click();
        // 监听器建立后发送 token
        setTimeout(function() {
          window.postMessage({ token: token, provider: 'github' }, window.location.origin);
        }, 800);
      }, 1000);
    })();
  </script>
</body>
</html>
