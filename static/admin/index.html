<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 张津华个人学术主页</title>
  <style>
    body { margin: 0; }
    /* 登录页面居中 */
    .login-message {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: "Noto Sans SC", sans-serif;
      color: #6b6b6b; font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
    // 自定义中文翻译（覆盖默认英文）
    CMS.registerLocale('zh-cn', {
      auth: {
        login: '使用 GitHub 登录',
        loggingIn: '正在登录…',
        loginWith: '使用 GitHub 登录',
      },
      app: {
        header: {
          content: '内容',
          media: '媒体库',
          workflow: '工作流',
        },
      },
      collection: {
        sidebar: {
          collections: '集合',
          searchAll: '搜索全部',
        },
      },
      editor: {
        editorControlPane: {
          publish: '发布',
          published: '已发布',
        },
        editor: {
          preview: '预览',
        },
      },
    });

    // 如果是 Edge 弹窗拦截导致弹窗打不开，
    // 重写 window.open 将弹窗改为当前窗口重定向
    var _origOpen = window.open;
    window.open = function(url, name, features) {
      if (url && url.indexOf('github.com/login/oauth') !== -1) {
        window.location.href = url;
        return { closed: false, close: function() {} };
      }
      return _origOpen(url, name, features);
    };

    CMS.init();

    // 重定向登录回跳后，用 sessionStorage 中的 token 完成认证
    (function checkToken() {
      var token = sessionStorage.getItem('gh_token');
      if (!token) return;
      // 给 CMS 一些初始化时间后尝试注入
      setTimeout(function() {
        // 方式1: 向自身发送 postMessage（CMS 可能在监听）
        window.postMessage({ token: token, provider: 'github' }, window.location.origin);
        // 方式2: 尝试访问内部 store
        try {
          var entry = Object.entries(window).find(function(e) {
            return e[1] && e[1].store && e[1].store.dispatch;
          });
          if (entry) {
            entry[1].store.dispatch({
              type: 'AUTH_SUCCESS',
              payload: { token: token, provider: 'github', email: token, name: token }
            });
          }
        } catch(e) {}
        sessionStorage.removeItem('gh_token');
      }, 2000);
    })();
  </script>
</body>
</html>
